services:
  web:
    build: .
    ports:
      - "80:5000"
    environment:
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/toddler_meals.db}
    volumes:
      # Persists SQLite DB and .env (put secrets in ~/meal-data/.env).
      # The app loads /app/instance/.env automatically on startup.
      - ${HOME}/meal-data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

services:
  web:
    build: .
    ports:
      - "80:5000"
    env_file:
      - .env
    environment:
      # Defaults if not set in .env — .env values win for overlapping keys with env_file
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/toddler_meals.db}
    volumes:
      # User accounts, toddlers, meal_logs, weekly plans, preferences — survive rebuilds
      - meal_data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  meal_data:
    driver: local

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  <!-- Plate -->
  <ellipse cx="256" cy="280" rx="140" ry="100" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="256" cy="280" rx="120" ry="85" fill="#f1f5f9"/>
  <!-- Food items on plate -->
  <!-- Rice/grain -->
  <ellipse cx="220" cy="260" rx="45" ry="30" fill="#fef3c7"/>
  <!-- Dal/curry -->
  <ellipse cx="300" cy="270" rx="35" ry="25" fill="#fbbf24"/>
  <!-- Vegetable -->
  <circle cx="250" cy="300" r="20" fill="#22c55e"/>
  <!-- Spoon -->
  <ellipse cx="380" cy="320" rx="15" ry="35" fill="#e2e8f0" transform="rotate(30, 380, 320)"/>
  <rect x="375" y="340" width="10" height="60" rx="5" fill="#e2e8f0" transform="rotate(30, 380, 370)"/>
  <!-- Baby face icon at top -->
  <circle cx="256" cy="140" r="50" fill="#fef3c7"/>
  <circle cx="240" cy="130" r="8" fill="#1e293b"/>
  <circle cx="272" cy="130" r="8" fill="#1e293b"/>
  <path d="M 240 155 Q 256 170 272 155" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>

# Fly.io deployment configuration
# Deploy with: flyctl launch

app = "toddler-meal-planner"
primary_region = "sin"  # Singapore - close to India

[build]
  dockerfile = "Dockerfile"

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "sqlite_data"
  destination = "/app/instance"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Opening LittleBowl…</title>
    {% include 'includes/pwa_head.html' %}
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fffaf0;
            --ink: #1e293b;
            --muted: #64748b;
            --green: #6b8f3c;
            --orange: #f97316;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Nunito, system-ui, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(107, 143, 60, 0.12), transparent 40%),
                radial-gradient(circle at 80% 0%, rgba(249, 115, 22, 0.12), transparent 35%),
                var(--bg);
            color: var(--ink);
            padding: 1.5rem;
        }
        .bridge {
            text-align: center;
            max-width: 22rem;
        }
        .mark {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin: 0 0 0.35rem;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        h1 .little { color: var(--green); }
        h1 .bowl { color: var(--orange); }
        p {
            margin: 0;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.45;
        }
        .spinner {
            width: 28px;
            height: 28px;
            margin: 1.25rem auto 0;
            border: 3px solid rgba(107, 143, 60, 0.2);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bridge" role="status" aria-live="polite">
        <img class="mark" src="{{ url_for('static', filename='images/littlebowl-mark.png') }}" alt="" width="64" height="64">
        <h1><span class="little">Little</span><span class="bowl">Bowl</span></h1>
        <p id="bridge-msg">Restoring your meal plan…</p>
        <div class="spinner" aria-hidden="true"></div>
    </div>
    <script src="{{ url_for('static', filename='js/session-persist.js') }}"></script>
    <script>
      (async function () {
        const msg = document.getElementById('bridge-msg');
        try {
          const data = await window.LittleBowlSession.restore();
          const toddlers = (data && data.toddlers) || [];
          if (toddlers.length) {
            const id = toddlers[0].id;
            window.LittleBowlSession.rememberToddler(id);
            window.location.replace('/dashboard/' + id);
            return;
          }
          msg.textContent = 'Setting up your profile…';
          window.location.replace('/onboarding');
        } catch (err) {
          console.warn('Session restore failed', err);
          msg.textContent = 'Continuing…';
          window.location.replace('/onboarding');
        }
      })();
    </script>
</body>
</html>

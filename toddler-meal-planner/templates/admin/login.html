<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1a1f16">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="LB Admin">
    <meta name="application-name" content="LittleBowl Admin">
    <meta name="description" content="LittleBowl Admin — operator login">
    <title>Admin Sign In · LittleBowl Admin</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest-admin.json') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1f16;
            padding: 1rem;
        }
        .admin-login {
            width: 100%;
            max-width: 400px;
        }
        .admin-login-card {
            background: #f7f4ec;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }
        .admin-login-card h1 {
            font-size: 1.35rem;
            margin: 0 0 0.35rem;
        }
        .admin-login-card .subtitle {
            color: #66715c;
            font-size: 0.9rem;
            margin: 0 0 1.5rem;
        }
        .admin-login-card label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
        }
        .admin-login-card .form-group {
            margin-bottom: 1rem;
        }
        .admin-login-card input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            border: 1px solid #d5d2c8;
            border-radius: 10px;
            font: inherit;
            background: #fff;
        }
        .admin-login-error {
            background: #fde8e8;
            color: #9b1c1c;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .admin-login-card .btn {
            width: 100%;
            margin-top: 0.5rem;
        }
        .admin-pwa-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #66715c;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="admin-login-card">
            <h1>Admin sign in</h1>
            <p class="subtitle">LittleBowl Admin app — use the email and password from server configuration.</p>

            {% if error %}
            <div class="admin-login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('admin_login') }}" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           value="{{ email or '' }}"
                           placeholder="admin@example.com"
                           autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Admin password">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-lock"></i> Sign in
                </button>
            </form>
            <p class="admin-pwa-hint">
                Tip: add this page to your home screen to open the admin login like an app on iOS/Android.
            </p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/a2hs-admin-prompt.js') }}" defer></script>
</body>
</html>
